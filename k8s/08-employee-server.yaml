apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-server
  template:
    metadata:
      labels:
        app: employee-server
    spec:
      containers:
      - name: employee-server
        image: kwsumin01/employee-server:v2
        ports:
        - containerPort: 5002
        env:
        - name: DB_HOST
          value: mysql
        - name: DB_PORT
          value: "3306"
        - name: DATABASE_HOST        # ← 추가
          value: mysql
        - name: DATABASE_USER        # ← 추가
          value: root
        - name: DATABASE_PASSWORD    # ← 추가
          value: kosa1004
        - name: DATABASE_DB_NAME     # ← 추가
          value: employees
        - name: PHOTO_SERVICE_URL    # ← 추가 (photo_service → photo-service)
          value: "http://photo-service:5003"
        envFrom:
        - secretRef:
            name: mariadb-secret
---
apiVersion: v1
kind: Service
metadata:
  name: employee-server
spec:
  selector:
    app: employee-server
  ports:
  - port: 5002
    targetPort: 5002