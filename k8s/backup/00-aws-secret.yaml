apiVersion: v1
kind: Secret
metadata:
  name: aws-secret
type: Opaque
data:
  # 아래 값들을 실제 AWS 키의 base64 인코딩으로 교체하세요
  # 인코딩 방법: echo -n "YOUR_VALUE" | base64
  #
  # AWS IAM 접속 키 (예: echo -n "AKIAXXXXXXXXXXXXXXXX" | base64)
  AWS_ACCESS_KEY_ID: REPLACE_WITH_BASE64_ACCESS_KEY_ID
  #
  # AWS IAM 시크릿 키 (예: echo -n "your+secret+key" | base64)
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_BASE64_SECRET_ACCESS_KEY
  #
  # 백업용 S3 버킷 이름 (예: echo -n "my-backup-bucket" | base64)
  AWS_S3_BUCKET: REPLACE_WITH_BASE64_BUCKET_NAME
  #
  # AWS 리전 (예: echo -n "ap-northeast-2" | base64 → YXAtbm9ydGhlYXN0LTI=)
  AWS_REGION: YXAtbm9ydGhlYXN0LTI=
