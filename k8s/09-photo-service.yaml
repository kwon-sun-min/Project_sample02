apiVersion: apps/v1
kind: Deployment
metadata:
  name: photo-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: photo-service
  template:
    metadata:
      labels:
        app: photo-service
    spec:
      containers:
      - name: photo-service
        image: kwsumin01/photo-service:v1
        ports:
        - containerPort: 5003
        envFrom:
        - secretRef:
            name: ceph-secret
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: photo-service
spec:
  selector:
    app: photo-service
  ports:
  - port: 5003
    targetPort: 5003
